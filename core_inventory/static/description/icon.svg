<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#1a1f3c"/>

  <!-- Warehouse building -->
  <rect x="40" y="90" width="120" height="75" rx="4" fill="#4361ee"/>
  <!-- Roof triangle -->
  <polygon points="30,90 100,45 170,90" fill="#3a0ca3"/>
  <!-- Door -->
  <rect x="80" y="130" width="40" height="35" rx="3" fill="#1a1f3c"/>

  <!-- Down arrow (incoming) -->
  <line x1="145" y1="20" x2="145" y2="55" stroke="#06d6a0" stroke-width="5" stroke-linecap="round"/>
  <polygon points="135,45 145,62 155,45" fill="#06d6a0"/>

  <!-- Up arrow (outgoing) -->
  <line x1="55" y1="62" x2="55" y2="25" stroke="#f72585" stroke-width="5" stroke-linecap="round"/>
  <polygon points="45,35 55,18 65,35" fill="#f72585"/>

  <!-- Shelf lines inside -->
  <line x1="52" y1="115" x2="148" y2="115" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <rect x="60" y="103" width="20" height="11" rx="2" fill="white" opacity="0.5"/>
  <rect x="90" y="103" width="20" height="11" rx="2" fill="white" opacity="0.5"/>
  <rect x="120" y="103" width="20" height="11" rx="2" fill="white" opacity="0.5"/>
</svg>
